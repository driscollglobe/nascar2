<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>The Lineup: NASCAR Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
/* tokens.css — the Two Seats / Lineup design language, inlined verbatim */
:root {
  --bg: #0d1117; --panel: #161c24; --panel2: #1d2530; --raised: #222c38;
  --line: #28323f; --line2: #34404f;
  --text: #eef2f6; --muted: #8a97a8; --faint: #5c6776;
  --amber: #f2e500; --amber2: #fff44d; --green: #37d99a; --red: #ff5d6c; --cyan: #3fd8e2;
  --display: "Barlow Condensed", "Oswald", "Arial Narrow", system-ui, sans-serif;
  --body: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --radius: 14px; --radius-sm: 9px; --gap: 14px; --maxw: 460px;
  --deal-ms: 420ms; --ease: cubic-bezier(0.22, 1, 0.36, 1);
  --check: repeating-conic-gradient(var(--text) 0% 25%, var(--bg) 0% 50%) 0 0 / 12px 12px;
}
@media (prefers-reduced-motion: reduce) { :root { --deal-ms: 0ms; } }

/* app.css — relevant subset, inlined from the daily so the prototype reads as family */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text); font-family: var(--body);
  -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; line-height: 1.5;
}
#app {
  max-width: var(--maxw); margin: 0 auto; min-height: 100vh; min-height: 100dvh;
  display: flex; flex-direction: column; padding: 0 16px env(safe-area-inset-bottom) 16px;
}
.display { font-family: var(--display); text-transform: uppercase; letter-spacing: 0.01em; }
.num { font-family: var(--display); font-weight: 700; font-variant-numeric: tabular-nums; }
.muted { color: var(--muted); } .faint { color: var(--faint); } .center { text-align: center; }
.row { display: flex; align-items: center; gap: 10px; }
.spread { justify-content: space-between; }
.stack { display: flex; flex-direction: column; }
.grow { flex: 1; } .hidden { display: none !important; }
.checker { height: 8px; background: var(--check); border-radius: 2px; opacity: 0.9; }
.checker.thin { height: 6px; opacity: 0.7; }

.btn {
  font-family: var(--display); font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em;
  font-size: 19px; border: 1px solid var(--line2); background: var(--raised); color: var(--text);
  border-radius: var(--radius); padding: 16px 18px; cursor: pointer;
  transition: transform 120ms var(--ease), background 120ms, border-color 120ms, opacity 120ms;
  user-select: none; -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: translateY(1px) scale(0.99); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn:focus-visible { outline: 3px solid var(--cyan); outline-offset: 2px; }
.btn.primary { background: var(--amber); border-color: var(--amber); color: #14110a; }
.btn.primary:hover { background: var(--amber2); }
.btn.sign { background: var(--amber); border-color: var(--amber); color: #14110a; }
.btn.pass { background: transparent; border-color: var(--line2); color: var(--text); }
.btn.ghost { background: transparent; border-color: var(--line); color: var(--muted); font-size: 15px; padding: 10px 14px; }
.tag {
  font-family: var(--display); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
  font-size: 12px; padding: 3px 8px; border-radius: 999px; border: 1px solid currentColor;
}
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 0 10px; }
.brand { display: flex; align-items: baseline; gap: 8px; }
.brand .wordmark { font-family: var(--display); font-weight: 700; font-size: 24px; letter-spacing: 0.04em; }
.brand .dot { color: var(--amber); }
.brand .mode { font-family: var(--display); font-weight: 600; font-size: 12px; letter-spacing: 0.1em; color: var(--cyan); text-transform: uppercase; }

.benchmark {
  background: linear-gradient(180deg, var(--panel2), var(--panel));
  border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; margin-top: 6px;
}
.benchmark .label { font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
.benchmark .org { font-family: var(--display); font-weight: 700; font-size: 26px; line-height: 1.05; margin: 4px 0 2px; }
.benchmark .meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 6px; }

.statusrow { display: flex; justify-content: space-between; align-items: center; margin: 12px 0; }
.passes { display: flex; gap: 6px; align-items: center; }
.pip { width: 11px; height: 11px; border-radius: 50%; border: 1px solid var(--line2); }
.pip.spent { background: var(--red); border-color: var(--red); }
.pip.left { background: var(--cyan); border-color: var(--cyan); }

.stage { position: relative; flex: 1; display: grid; place-items: center; min-height: 320px; margin: 8px 0; }

.card {
  width: 100%; max-width: 320px; background: linear-gradient(180deg, var(--raised), var(--panel2));
  border: 1px solid var(--line2); border-radius: 18px; padding: 0; overflow: hidden;
  box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
}
.card .stripe { height: 10px; background: var(--check); }
.card .body { padding: 20px 20px 22px; }
.card .driver { font-family: var(--display); font-weight: 700; font-size: 40px; line-height: 0.98; margin: 14px 0 2px; }
.card .year { font-family: var(--display); font-weight: 600; font-size: 22px; color: var(--muted); }
.card .hide {
  margin-top: 18px; padding-top: 14px; border-top: 1px solid var(--line);
  display: flex; align-items: center; justify-content: space-between;
}
.card .hide .q { font-family: var(--display); font-weight: 700; font-size: 34px; color: var(--faint); }
.card .hide .k { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); max-width: 150px; text-align: right; }
.card .tag.team { color: var(--muted); border-color: var(--line2); font-size: 11px; }
.card.dealing { animation: deal var(--deal-ms) var(--ease); }
@keyframes deal { from { opacity: 0; transform: translateY(26px) rotate(-3deg) scale(0.94); } to { opacity: 1; transform: none; } }
.card.leaving { animation: leave 200ms var(--ease) forwards; }
@keyframes leave { to { opacity: 0; transform: translateY(-18px) scale(0.96); } }
.card.revealed .hide .q { transition: color 160ms; }

.lineup { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
.lseat {
  display: flex; align-items: center; justify-content: space-between; padding: 9px 12px;
  border: 1px solid var(--line); border-radius: var(--radius-sm); background: var(--panel);
  transition: border-color 160ms var(--ease), background 160ms;
}
.lseat.open { border-style: dashed; }
.lseat.filled { border-color: var(--line2); background: var(--panel2); animation: deal 240ms var(--ease); }
.lseat-n { font-family: var(--display); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; font-size: 12px; color: var(--muted); }
.lseat-open { font-size: 12px; color: var(--faint); }
.lseat-nm { font-family: var(--display); font-weight: 700; font-size: 18px; }
.lseat-yr { font-family: var(--display); font-weight: 600; font-size: 13px; color: var(--cyan); margin-left: 6px; }
.lseat-tier { font-family: var(--display); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; }
.lseat-name { display: inline-flex; align-items: baseline; gap: 2px; min-width: 0; }

.actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 6px 0 8px; }
.actions .btn { padding: 18px; font-size: 21px; }
.hintline { text-align: center; font-size: 12.5px; color: var(--faint); margin: 2px 0 12px; min-height: 16px; }
kbd { font-family: var(--body); font-size: 11px; background: var(--panel2); border: 1px solid var(--line2); border-bottom-width: 2px; border-radius: 5px; padding: 1px 6px; color: var(--muted); }

.banner { border-radius: var(--radius); padding: 18px; text-align: center; margin: 8px 0; border: 1px solid var(--line2); }
.banner .verdict { font-family: var(--display); font-weight: 700; font-size: 40px; line-height: 0.95; }
.banner.victory { background: linear-gradient(180deg, rgba(242,229,0,0.16), var(--panel)); border-color: var(--amber); }
.banner.victory .verdict { color: var(--amber); }
.banner.win { background: linear-gradient(180deg, rgba(55,217,154,0.14), var(--panel)); border-color: var(--green); }
.banner.win .verdict { color: var(--green); }
.banner.miss { background: linear-gradient(180deg, rgba(255,93,108,0.12), var(--panel)); border-color: var(--red); }
.banner.miss .verdict { color: var(--red); }
.banner .sub { color: var(--muted); font-size: 14px; margin-top: 4px; }

.section-title {
  font-family: var(--display); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
  font-size: 14px; color: var(--muted); margin: 18px 0 8px; display: flex; align-items: center; gap: 10px;
}
.section-title::after { content: ""; flex: 1; height: 1px; background: var(--line); }
.dynasty { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 14px; }
.dynasty .head { font-size: 13.5px; color: var(--muted); margin-bottom: 0; }
.dynasty .head b { color: var(--text); }

.lede { color: var(--muted); font-size: 14.5px; margin: 10px 0; }
.foot { margin-top: auto; padding: 14px 0; color: var(--faint); font-size: 11.5px; text-align: center; }

@media (min-width: 520px) { .card { max-width: 340px; } }

/* head to head reveal */
.vs { background: linear-gradient(180deg, var(--panel2), var(--panel)); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px 14px 8px; margin: 6px 0 4px; }
.vs-tops { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 10px; padding-bottom: 12px; border-bottom: 1px solid var(--line); }
.vs-top { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.vs-top.you { align-items: flex-start; text-align: left; }
.vs-top.them { align-items: flex-end; text-align: right; }
.vs-top .lbl { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.vs-top .tot { font-family: var(--display); font-weight: 700; font-size: 52px; line-height: 0.85; }
.vs-top.you .tot { color: var(--amber); transition: color 200ms; }
.vs-top.them .tot { color: var(--text); }
.vs-top .tot.victory { color: var(--amber); }
.vs-top .tot.win { color: var(--green); }
.vs-top .tot.miss { color: var(--red); }
.vs-x { font-weight: 700; font-size: 14px; color: var(--faint); padding: 0 2px; }
.vs-rows { padding-top: 8px; }
.vs-row { display: grid; grid-template-columns: 1fr 18px 1fr; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid rgba(40, 50, 63, 0.5); }
.vs-row:last-child { border-bottom: 0; }
.vs-tick { width: 6px; height: 6px; border-radius: 50%; background: var(--line2); margin: 0 auto; }
.vs-row .cell { display: flex; align-items: baseline; gap: 8px; min-width: 0; }
.vs-row .cell.you { justify-content: space-between; }
.vs-row .cell.them { justify-content: space-between; flex-direction: row; }
.vs-row .cell .nm { font-family: var(--display); font-weight: 600; font-size: 17px; line-height: 1.05; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.vs-row .cell.them .nm { text-align: right; }
.vs-row .cell .nm-wrap { display: inline-flex; align-items: baseline; gap: 6px; min-width: 0; }
.vs-row .cell .yr { font-family: var(--display); font-weight: 600; font-size: 13px; color: var(--cyan); flex: none; }
.vs-row .cell .w { font-family: var(--display); font-weight: 700; font-size: 22px; color: var(--muted); font-variant-numeric: tabular-nums; }
.vs-row .cell .w.lead { color: var(--amber2); }
.vs-row .cell.empty { opacity: 0.25; }
.w.appear, .cell.appear { animation: deal 280ms var(--ease); }

.flag-host { min-height: 0; }
.raceflag { font-family: var(--display); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; font-size: 34px; text-align: center; padding: 18px 12px; border-radius: var(--radius); margin: 4px 0 10px; animation: flagin 220ms var(--ease); }
.raceflag.out { animation: flagout 240ms var(--ease) forwards; }
.raceflag.green { background: var(--green); color: #06120c; }
.raceflag.checkered { display: flex; flex-direction: column; gap: 14px; color: var(--text); background: var(--panel); border: 1px solid var(--line); text-shadow: none; }
.raceflag.checkered::before, .raceflag.checkered::after {
  content: ""; display: block; height: 16px; border-radius: 4px; background-color: var(--bg);
  background-image: linear-gradient(45deg, var(--text) 25%, transparent 25%), linear-gradient(-45deg, var(--text) 25%, transparent 25%), linear-gradient(45deg, transparent 75%, var(--text) 75%), linear-gradient(-45deg, transparent 75%, var(--text) 75%);
  background-size: 16px 16px; background-position: 0 0, 0 8px, 8px -8px, -8px 0;
}
@keyframes flagin { from { opacity: 0; transform: translateY(-10px) scale(0.96); } to { opacity: 1; transform: none; } }
@keyframes flagout { to { opacity: 0; transform: translateY(-8px) scale(0.98); } }

.pct { display: flex; flex-direction: column; gap: 2px; background: rgba(63, 216, 226, 0.08); border: 1px solid rgba(63, 216, 226, 0.3); border-radius: var(--radius-sm); padding: 10px 12px; margin: 10px 0; }
.pct-v { font-family: var(--display); font-weight: 600; font-size: 17px; color: var(--text); }

/* cross-era badge + sweep panel (prototype-only chrome) */
.era-tag { font-family: var(--display); font-weight: 700; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--bg); background: var(--cyan); border-radius: 4px; padding: 2px 6px; }
.sweep { background: var(--panel); border: 1px solid var(--line2); border-radius: var(--radius); padding: 14px; margin: 12px 0; }
.sweep h3 { font-family: var(--display); font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; font-size: 14px; margin: 0 0 8px; color: var(--text); }
.sweep .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin: 8px 0; }
.sweep .stat { background: var(--panel2); border: 1px solid var(--line); border-radius: var(--radius-sm); padding: 10px; }
.sweep .stat .v { font-family: var(--display); font-weight: 700; font-size: 28px; line-height: 1; }
.sweep .stat .k { font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }
.sweep .verdict-line { font-size: 13.5px; color: var(--text); margin-top: 8px; padding: 10px 12px; border-radius: var(--radius-sm); background: var(--panel2); border: 1px solid var(--line); }
.sweep .verdict-line.tense { border-color: var(--green); }
.sweep .verdict-line.trivial { border-color: var(--red); }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

/* ---------------- games hub ---------------- */
.hub-lede { color: var(--muted); font-size: 14.5px; margin: 8px 0 2px; }
.hub-cards { display: flex; flex-direction: column; gap: 12px; margin-top: 12px; }
.gamecard {
  text-align: left; background: linear-gradient(180deg, var(--panel2), var(--panel));
  border: 1px solid var(--line2); border-radius: var(--radius); padding: 16px;
  cursor: pointer; font-family: var(--body); color: var(--text); width: 100%;
  transition: transform 120ms var(--ease), border-color 120ms;
  -webkit-tap-highlight-color: transparent;
}
.gamecard:active { transform: translateY(1px) scale(0.995); }
.gamecard.primary { border-color: var(--amber); background: linear-gradient(180deg, rgba(242, 229, 0, 0.10), var(--panel)); }
.gamecard.soon { opacity: 0.55; cursor: default; }
.gamecard .gc-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.gamecard .gc-title { font-family: var(--display); font-weight: 700; text-transform: uppercase; font-size: 26px; line-height: 1; }
.gamecard .gc-desc { color: var(--muted); font-size: 14px; margin-top: 6px; line-height: 1.45; }
.gamecard .gc-stat { font-family: var(--display); font-weight: 600; font-size: 13px; color: var(--cyan); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 8px; }

/* ---------------- daily grid ---------------- */
.ggrid { display: grid; grid-template-columns: minmax(64px, 88px) repeat(3, 1fr); gap: 6px; margin: 10px 0 6px; }
.ghead {
  display: flex; align-items: center; justify-content: center; text-align: center;
  font-family: var(--display); font-weight: 600; font-size: 12.5px; line-height: 1.15;
  text-transform: uppercase; letter-spacing: 0.03em; color: var(--muted); padding: 6px 2px; min-height: 44px;
}
.ghead.rowhead { text-align: left; justify-content: flex-start; padding-left: 2px; }
.gcell {
  aspect-ratio: 1 / 1; min-height: 72px; border: 1px solid var(--line2); border-radius: var(--radius-sm);
  background: var(--panel2); cursor: pointer; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px; padding: 4px; color: var(--text);
  font-family: var(--body); -webkit-tap-highlight-color: transparent;
}
.gcell.sel { border-color: var(--cyan); box-shadow: 0 0 0 2px rgba(63, 216, 226, 0.25); }
.gcell.ok { border-color: var(--green); background: rgba(55, 217, 154, 0.10); cursor: default; }
.gcell.dead { opacity: 0.45; cursor: default; }
.gcell .gc-nm { font-family: var(--display); font-weight: 700; font-size: 14.5px; line-height: 1.05; text-align: center; }
.gcell .gc-r { font-size: 11px; color: var(--muted); }
.gc-plus { font-family: var(--display); font-weight: 700; font-size: 26px; color: var(--faint); }
.gstatus { display: flex; justify-content: space-between; align-items: baseline; margin: 6px 0 0; }
.gpanel { background: var(--panel); border: 1px solid var(--line2); border-radius: var(--radius); padding: 14px; margin: 8px 0; }
.gpanel .gp-clues { font-family: var(--display); font-weight: 700; font-size: 19px; line-height: 1.25; text-transform: uppercase; }
.gpanel .gp-x { color: var(--amber); padding: 0 6px; }
.ginput {
  width: 100%; margin-top: 10px; font-size: 18px; padding: 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--line2); background: var(--panel2); color: var(--text); font-family: var(--body);
}
.ginput:focus { outline: 2px solid var(--cyan); }
.gsug { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
.gsug button {
  text-align: left; font-size: 16px; padding: 13px 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--line); background: var(--raised); color: var(--text); cursor: pointer; font-family: var(--body);
  -webkit-tap-highlight-color: transparent;
}
.gsug button .yrs { color: var(--muted); font-size: 13px; }
.gfeed { margin: 8px 0; padding: 12px 14px; border-radius: var(--radius-sm); border: 1px solid var(--line2); background: var(--panel); font-size: 14.5px; line-height: 1.45; }
.gfeed.good { border-color: var(--green); }
.gfeed.bad { border-color: var(--red); }
.sharebox {
  white-space: pre-wrap; font-family: var(--body); font-size: 14px; background: var(--panel2);
  border: 1px solid var(--line2); border-radius: var(--radius-sm); padding: 12px; margin: 10px 0;
  user-select: text; -webkit-user-select: text; line-height: 1.5;
}

/* ---------------- streak ---------------- */
.duelq { font-family: var(--display); font-weight: 700; font-size: 30px; text-align: center; margin: 14px 0 2px; line-height: 1; text-transform: uppercase; }
.duelsub { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 12px; }
.duel { display: flex; flex-direction: column; gap: 12px; }
.vsline { text-align: center; font-family: var(--display); font-weight: 700; color: var(--faint); font-size: 15px; }
.duelcard {
  position: relative; text-align: left; width: 100%;
  background: linear-gradient(180deg, var(--raised), var(--panel2));
  border: 1px solid var(--line2); border-radius: var(--radius); padding: 20px 96px 20px 16px;
  cursor: pointer; color: var(--text); font-family: var(--body);
  -webkit-tap-highlight-color: transparent;
}
.duelcard:active { transform: translateY(1px); }
.duelcard .dc-nm { font-family: var(--display); font-weight: 700; font-size: 30px; line-height: 1; }
.duelcard .dc-yr { color: var(--muted); font-size: 13px; margin-top: 4px; }
.duelcard .dc-w { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); font-family: var(--display); font-weight: 700; font-size: 40px; }
.duelcard.right { border-color: var(--green); }
.duelcard.right .dc-w { color: var(--green); }
.duelcard.wrong { border-color: var(--red); }
.duelcard.wrong .dc-w { color: var(--red); }
.streakbar { display: flex; justify-content: space-between; align-items: baseline; margin: 6px 0 0; }
.streakbar .sb-n { font-family: var(--display); font-weight: 700; font-size: 44px; color: var(--amber); line-height: 1; }
.expbanner {
  border: 1px solid var(--amber); background: rgba(242, 229, 0, 0.08); border-radius: var(--radius-sm);
  padding: 10px 12px; font-size: 13px; color: var(--text); margin: 10px 0 0; line-height: 1.45;
}
</style>
</head>

    // minus the exact (driver, year) cards on the target roster (no drafting the
    // benchmark literally against itself).
    var rosterKey = new Set(orgSeason.realRoster.map(function (r) { return orgSeason.year + "|" + r.driver; }));
    var pickRng = rngFromSeed(seedStr + "|cross");
    var candidates = [];
    _byDriver.forEach(function (cards, driver) {
      if (!_careerWinners.has(driver)) return;
      var seasons = cards.filter(function (c) { return !rosterKey.has(c.year + "|" + c.driver); });
      if (!seasons.length) return;
      candidates.push(seasons[Math.floor(pickRng() * seasons.length)]);
    });

    // Deck guarantee (ported from the daily): the candidate set must be able
    // to beat the benchmark BEFORE any pack is dealt, so no deal ever relies
    // on post-deal repair. If the seed dealt the whole pool down-years (the
    // failure mode: a 2-seat, 14-win benchmark with every candidate season
    // low), upgrade the biggest-peak drivers to their best available season,
    // strongest first, until the top `seats` candidates clear the benchmark.
    // Deterministic: no rng, and a no-op for deals that were already fine.
    function topSum(list) {
      return list.map(function (c) { return c.wins; }).sort(function (a, b) { return b - a; })
        .slice(0, seats).reduce(function (a, b) { return a + b; }, 0);
    }
    if (topSum(candidates) < benchmark) {
      var peaks = [];
      _byDriver.forEach(function (cards2, driver) {
        if (!_careerWinners.has(driver)) return;
        var eligible = cards2.filter(function (c) { return !rosterKey.has(c.year + "|" + c.driver); });
        if (!eligible.length) return;
        peaks.push(eligible.reduce(function (a, b) { return b.wins > a.wins ? b : a; }));
      });
      peaks.sort(function (a, b) { return b.wins - a.wins; });
      for (var pi = 0; pi < peaks.length && topSum(candidates) < benchmark; pi++) {
        for (var ci = 0; ci < candidates.length; ci++) {
          if (candidates[ci].driver === peaks[pi].driver) { candidates[ci] = peaks[pi]; break; }
        }
      }
    }

    var packSize = clamp(seats + passes + (PACK.extra || 0), PACK.minSize, PACK.maxSize);
    var cards = shuffle(candidates, rngFromSeed(seedStr + "|field")).slice(0, packSize);

    // Guarantee the SET is winnable: top `seats` cards must reach the benchmark.
    // Cross-era this is nearly always already true; if not, swap the weakest card
    // for the strongest unused career season (same guard shape as the daily).
    var allSorted = candidates.slice().sort(function (a, b) { return b.wins - a.wins; });
    function topSeatsSum(cs) {
      return cs.map(function (c) { return c.wins; }).sort(function (a, b) { return b - a; })
        .slice(0, seats).reduce(function (a, b) { return a + b; }, 0);
    }
    var guard = 0;
    while (topSeatsSum(cards) < benchmark && guard < allSorted.length) {
      var have = new Set(cards.map(function (c) { return c.driver; }));
      var strongest = allSorted.find(function (c) { return !have.has(c.driver); });
      if (!strongest) break;
      var wi = -1, wmin = Infinity;
      cards.forEach(function (c, idx) { if (c.wins < wmin) { wmin = c.wins; wi = idx; } });
      if (wi < 0 || strongest.wins <= cards[wi].wins) break;
      cards[wi] = strongest; guard++;
    }

    // Order so an optimal player CAN win under the pass limit (copied from daily):
    // reshuffle until solvable, repair as a last resort.
    function winsOf(cs) { return cs.map(function (c) { return c.wins; }); }
    var pack = shuffle(cards, rngFromSeed(seedStr + "|order"));
    var tries = 0, repaired = false;
    while (solveMaxAchievable(winsOf(pack), seats, passes) < benchmark && tries < 80) {
      tries++; pack = shuffle(cards, rngFromSeed(seedStr + "|order|" + tries));
    }
    if (solveMaxAchievable(winsOf(pack), seats, passes) < benchmark) {
      pack = repairWinnableOrder(pack, seats, passes); repaired = true;
    }
    var maxOrdered = solveMaxAchievable(winsOf(pack), seats, passes);
    return {
      orgId: orgSeason.id, year: orgSeason.year, seats: seats, passes: passes, pack: pack,
      benchmark: benchmark, maxOrdered: maxOrdered, winnable: maxOrdered >= benchmark, repaired: repaired,
    };
  }

  /* ---------------- engine (copied from src/game/engine.js) ---------------- */
  function Engine(run, orgSeason) {

    get seatsLeft() { return this.seats - this.signed.length; },
    get passesLeft() { return this.passes - this.passesUsed; },
    get cardsLeftAfterCurrent() { return this.pack.length - (this.index + 1); },
    currentCard: function () { if (this.status === "done") return null; return this.pack[this.index] || null; },
    canSign: function () { return this.status === "dealing" && this.seatsLeft > 0 && !!this.currentCard(); },
    canPass: function () {
      if (this.status !== "dealing") return false;
      if (this.passesLeft <= 0) return false;
      if (!this.currentCard()) return false;
      return this.cardsLeftAfterCurrent >= this.seatsLeft;

    sign: function () {
      if (!this.canSign()) return false;

    },
    pass: function () {

    },
    _advance: function () {

    _finish: function () { this.status = "done"; this.result = scoreRun(this.signed, this.org); },
  };

  /* ---------------- tiny dom helper (copied from src/ui/dom.js) ---------------- */

      if (k === "class") node.className = v;
      else if (k === "html") node.innerHTML = v;
      else if (k === "text") node.textContent = v;
      else if (k.indexOf("on") === 0 && typeof v === "function") node.addEventListener(k.slice(2).toLowerCase(), v);
      else if (k in node && k !== "list") { try { node[k] = v; } catch (e) { node.setAttribute(k, v); } }
      else node.setAttribute(k, v);
    }
    var kids = Array.isArray(children) ? children : [children];

  /* ---------------- naive strategies (for the difficulty check) ----------------
     "Sign the biggest names" models a fan who drafts by reputation, not by the
     hidden current-season win count. The seats most-famous drivers in a pack are
     the player's targets; they pass lesser names to hold seats for those targets,
     but the limited pass budget can force their hand. This is the cross-era
     trivialization worry made concrete: famous names, random dealt seasons.     */
  function nameChaserDraft(pack, seats, passes) {
    var ranked = pack.map(function (c) { return { driver: c.driver, fame: fameOf(c.driver) }; })
      .sort(function (a, b) { return b.fame - a.fame; });
    var targets = new Set(ranked.slice(0, seats).map(function (o) { return o.driver; }));
    var seatsLeft = seats, passesLeft = passes, signed = [];
    for (var i = 0; i < pack.length && seatsLeft > 0; i++) {
      var card = pack[i];
      var cardsAfter = pack.length - (i + 1);
      var canPass = passesLeft > 0 && cardsAfter >= seatsLeft;
      var want = targets.has(card.driver);
      var sign = want || !canPass;
      if (sign) { signed.push(card); seatsLeft--; targets.delete(card.driver); }
      else passesLeft--;
    }
    return signed;
  }
  function randomDraft(pack, seats, passes, rnd) {
    var seatsLeft = seats, passesLeft = passes, signed = [];
    for (var i = 0; i < pack.length && seatsLeft > 0; i++) {
      var cardsAfter = pack.length - (i + 1);
      var canPass = passesLeft > 0 && cardsAfter >= seatsLeft;
      var sign = !canPass || rnd() < 0.5;
      if (sign) { signed.push(pack[i]); seatsLeft--; } else passesLeft--;
    }
    return signed;
  }

  // The difficulty check the prototype is meant to surface. Fresh benchmark + fresh
  // cross-era pack each iteration, deterministic by seed so it is reproducible.
  function runSweep(n) {
    n = n || 200;
    var targets = ORG_SEASONS.filter(function (o) { return o.benchmarkWins >= MIN_BENCHMARK && o.seats >= 2; });
    var pickRng = mulberry32(hashString("crossera-sweep-v1"));
    var chaserWins = 0, chaserVL = 0, randWins = 0, optWins = 0, unwinnable = 0, repaired = 0;
    var benchSum = 0, chaserTotalSum = 0, chaserMarginSum = 0;
    var benchDist = {};
    for (var k = 0; k < n; k++) {
      var os = targets[Math.floor(pickRng() * targets.length)];
      var seed = "sweep|" + k + "|" + os.id;
      var run = buildCrossEraRun(os, seed);
      if (!run.winnable) unwinnable++;
      if (run.repaired) repaired++;
      var chaser = scoreRun(nameChaserDraft(run.pack, run.seats, run.passes), os);
      var rnd = mulberry32(hashString(seed + "|rnd"));
      var random = scoreRun(randomDraft(run.pack, run.seats, run.passes, rnd), os);
      if (chaser.win) chaserWins++;
      if (chaser.victoryLane) chaserVL++;
      if (random.win) randWins++;
      if (run.maxOrdered >= os.benchmarkWins) optWins++;
      benchSum += os.benchmarkWins; chaserTotalSum += chaser.total; chaserMarginSum += chaser.diff;
      benchDist[os.benchmarkWins] = (benchDist[os.benchmarkWins] || 0) + 1;
    }
    return {
      n: n,
      chaserWinRate: chaserWins / n,
      chaserVictoryLaneRate: chaserVL / n,
      randomWinRate: randWins / n,
      optimalWinRate: optWins / n,
      avgBenchmark: benchSum / n,
      avgChaserTotal: chaserTotalSum / n,
      avgChaserMargin: chaserMarginSum / n,
      unwinnable: unwinnable, repaired: repaired,
      playableTargets: targets.length, totalTargets: ORG_SEASONS.length,
      benchDist: benchDist,
    };
  }

    if (!tokens.length) return String(name);
    var last = tokens[tokens.length - 1];
    if (tokens.length > 1 && /^(Jr|Sr)\.?$/i.test(last)) return tokens[tokens.length - 2] + " " + last.replace(/\.$/, "");
    return last;
  }

    setScreen(
      el("div", { class: "checker" }),
      el("div", { class: "row spread", style: "margin:8px 0 2px" }, [
        el("div", { class: "wordmark display", style: "font-size:20px", text: "Cross-Era matchup" }),
        el("span", { class: "era-tag", text: "All eras" }),
      ]),
      el("div", { class: "lede", text: "Build a lineup from NASCAR history and beat a real team's season. Sign or pass one driver at a time, any season since 1983. " + passes + " " + (passes === 1 ? "pass" : "passes") + ". A famous name in a down year is a trap." }),
      benchmarkHero(os),
      el("button", { class: "btn primary", style: "margin-top:14px", text: "Play matchup", onClick: function () { startRun(); } }),
      el("div", { class: "actions", style: "margin-top:10px" }, [
        el("button", { class: "btn ghost", text: "New matchup", onClick: function () { newMatchup(); } }),
        el("button", { class: "btn ghost", text: "Difficulty check", onClick: function () { renderSweep(); } }),
      ])
    );
  }

  function startRun(seed) {
    var os = App.orgSeason;
    seed = seed || ("crossera|" + os.id + "|" + Math.floor(Math.random() * 1e9));
    App.lastSeed = seed;
    App.run = buildCrossEraRun(os, seed);
    App.engine = new Engine(App.run, os);
    renderDeal();
  }

  function renderDeal() {
    var os = App.orgSeason;
    var hero = el("section", { class: "benchmark", style: "padding:12px 14px" }, [
      el("div", { class: "row spread" }, [
        el("div", {}, [
          el("div", { class: "label", text: "Wins to beat · " + os.year + " " + shortOrg(os.org) }),
          el("div", { class: "org", style: "font-size:21px", text: beatLine(os) }),
        ]),
        el("div", { class: "num", style: "font-size:46px;color:var(--amber);line-height:0.85", text: String(os.benchmarkWins) }),
      ]),
    ]);
    var lineup = el("div", { class: "lineup", id: "lineup" });
    var passesRow = el("div", { class: "passes", id: "passesRow" });
    var passesWrap = el("div", { class: "row spread", style: "margin:2px 0 6px" }, [
      el("div", { class: "label muted", style: "font-size:11px;letter-spacing:.1em;text-transform:uppercase", text: "Your team (any era)" }),
      el("div", { class: "row", style: "gap:8px" }, [
        el("span", { class: "label muted", style: "font-size:11px;letter-spacing:.1em;text-transform:uppercase", text: "Passes" }),
        passesRow,
      ]),
    ]);
    var stage = el("div", { class: "stage", id: "stage" });
    var signBtn = el("button", { class: "btn sign", id: "signBtn", text: "Sign" });
    var passBtn = el("button", { class: "btn pass", id: "passBtn", text: "Pass" });
    signBtn.addEventListener("click", function () { doAction("sign"); });
    passBtn.addEventListener("click", function () { doAction("pass"); });
    var actions = el("div", { class: "actions" }, [signBtn, passBtn]);
    var hint = el("div", { class: "hintline", id: "hint" });

    setScreen(el("div", { class: "checker thin" }), hero, stage, actions, hint, passesWrap, lineup);
    attachKeys();
    paintStatus();
    dealCurrentCard(false);
  }

  function paintStatus() {
    var eng = App.engine;
    var lineupEl = document.getElementById("lineup");
    var passesRow = document.getElementById("passesRow");
    clear(lineupEl);
    for (var i = 0; i < eng.seats; i++) mount(lineupEl, lineupSeat(i, eng.signed[i]));
    clear(passesRow);
    for (var j = 0; j < eng.passes; j++) {
      var spent = j < eng.passesUsed;
      mount(passesRow, el("span", { class: "pip " + (spent ? "spent" : "left") }));
    }
    var signBtn = document.getElementById("signBtn");
    var passBtn = document.getElementById("passBtn");
    if (signBtn) signBtn.disabled = !eng.canSign();
    if (passBtn) passBtn.disabled = !eng.canPass();
    var hint = document.getElementById("hint");
    if (hint) {
      if (!eng.canPass() && eng.passesLeft <= 0) hint.innerHTML = "No passes left. Fill your seats. <kbd>S</kbd> sign";
      else if (!eng.canPass()) hint.innerHTML = "Pass closed. You need every card left to fill the seats. <kbd>S</kbd> sign";
      else hint.innerHTML = "<kbd>S</kbd> sign &nbsp; <kbd>P</kbd> pass";
    }
  }

  function dealCurrentCard(skipAnim) {
    var eng = App.engine;
    var stage = document.getElementById("stage");
    clear(stage);
    var card = eng.currentCard();
    if (!card) return;
    mount(stage, driverCard(card, !skipAnim));
  }

  function revealCardTier(cardNode, card, action) {
    if (!cardNode) return;
    var t = tierMeta(card.tier);
    var q = cardNode.querySelector(".hide .q");
    var k = cardNode.querySelector(".hide .k");
    if (q) { q.textContent = t.label; q.style.color = t.color; q.style.fontSize = "20px"; }
    if (k) k.textContent = action === "sign" ? "Signed" : "Passed";
    cardNode.classList.add("revealed");
  }

  function doAction(kind) {
    var eng = App.engine;
    if (kind === "sign" && !eng.canSign()) return;
    if (kind === "pass" && !eng.canPass()) return;
    var stage = document.getElementById("stage");
    var cardNode = stage && stage.querySelector(".card");
    var reduced = prefersReducedMotion();
    var decided = eng.currentCard();
    revealCardTier(cardNode, decided, kind);
    var apply = function () {
      if (kind === "sign") eng.sign(); else eng.pass();
      if (eng.status === "done") showResult();
      else { paintStatus(); dealCurrentCard(false); }
    };
    if (reduced || !cardNode) apply();
    else { cardNode.classList.add("leaving"); setTimeout(apply, 420); }
  }

  function showResult() {
    var eng = App.engine, os = App.orgSeason, result = eng.result, run = App.run;
    var percentile = draftPercentile(result.total, run.pack.map(function (c) { return c.wins; }), run.seats, run.passes);
    var view = buildResultView({ signed: eng.signed, result: result, orgSeason: os, percentile: percentile });
    var actions = el("div", { class: "stack", style: "gap:10px;margin-top:16px" }, [
      el("button", { class: "btn primary", text: "New matchup", onClick: function () { newMatchup(); } }),
      el("div", { class: "actions" }, [
        el("button", { class: "btn ghost", text: "Replay this pack", onClick: function () { startRun(App.lastSeed); } }),
        el("button", { class: "btn ghost", text: "Difficulty check", onClick: function () { renderSweep(); } }),
      ]),
    ]);
    setScreen(el("div", { class: "checker" }), view.node, actions);
    view.play();
  }

  function pct(x) { return Math.round(x * 100) + "%"; }

  function renderSweep() {
    detachKeys();
    var loading = el("div", { class: "sweep" }, [
      el("h3", { text: "Difficulty check" }),
      el("div", { class: "lede", text: "Running 200 fresh cross-era matchups…" }),
    ]);
    setScreen(el("div", { class: "checker thin" }), loading);
    // let the loading frame paint before the synchronous sweep blocks the thread
    setTimeout(function () {
      var s = runSweep(200);
      var trivial = s.chaserWinRate >= 0.9;
      var panel = el("div", { class: "sweep" }, [
        el("h3", { text: "Difficulty check · " + s.n + " cross-era matchups" }),
        el("div", { class: "lede", style: "margin-top:0", text: "Each matchup is a fresh real benchmark and a fresh cross-era pack. “Sign the biggest names” drafts by driver fame, not the hidden season. That is the naive trivialization play." }),
        el("div", { class: "grid" }, [
          stat(pct(s.chaserWinRate), "Biggest-names win rate", trivial ? "var(--red)" : "var(--green)"),
          stat(pct(s.chaserVictoryLaneRate), "…of those, Victory Lane", "var(--amber)"),
          stat(pct(s.randomWinRate), "Random play win rate", "var(--muted)"),
          stat(pct(s.optimalWinRate), "Optimal win rate (by design)", "var(--cyan)"),
        ]),
        el("div", { class: "lede", style: "font-size:13px", text: "Avg benchmark " + s.avgBenchmark.toFixed(1) + " wins · biggest-names avg total " + s.avgChaserTotal.toFixed(1) + " (margin " + (s.avgChaserMargin >= 0 ? "+" : "") + s.avgChaserMargin.toFixed(1) + ") · " + s.unwinnable + " unwinnable, " + s.repaired + " order-repaired." }),
        el("div", { class: "verdict-line " + (trivial ? "trivial" : "tense"), text: trivial
          ? "Reads as TRIVIAL: naive name-chasing wins " + pct(s.chaserWinRate) + " of the time. Mode two likely needs a cap (tier budget / salary cap / one-legend-per-roster)."
          : "Reads as TENSE: naive name-chasing wins " + pct(s.chaserWinRate) + ", well off the optimal " + pct(s.optimalWinRate) + ". The seats + limited passes constraint is still doing work." }),
      ]);
      setScreen(
        el("div", { class: "checker thin" }),
        panel,
        el("div", { class: "actions", style: "margin-top:6px" }, [
          el("button", { class: "btn ghost", text: "Back to matchup", onClick: function () { renderHome(); } }),
          el("button", { class: "btn ghost", text: "Run again", onClick: function () { renderSweep(); } }),
        ])
      );
    }, 40);
  }
  function stat(v, k, color) {
    return el("div", { class: "stat" }, [
      el("div", { class: "v", style: color ? "color:" + color : "", text: v }),
      el("div", { class: "k", text: k }),
    ]);
  }

  function attachKeys() {
    detachKeys();
    App.keyHandler = function (e) {
      var k = e.key.toLowerCase();
      if (k === "s" || k === "enter") { e.preventDefault(); doAction("sign"); }
      else if (k === "p" || k === "backspace") { e.preventDefault(); doAction("pass"); }
    };
    document.addEventListener("keydown", App.keyHandler);
  }
  function detachKeys() {
    if (App.keyHandler) { document.removeEventListener("keydown", App.keyHandler); App.keyHandler = null; }
  }

  // Inspection hook for the measurement run.
  window.__CROSSERA__ = { runSweep: runSweep, buildCrossEraRun: buildCrossEraRun, fameOf: fameOf, ORG_SEASONS: ORG_SEASONS, POOL: POOL };

  App.root = document.getElementById("app");
  // Owned by the games hub now: no auto-launch. The hub calls enter().
  window.__CROSSERA_MODE__ = {
    enter: function () { App.orgSeason = null; newMatchup(); },
    leave: function () { detachKeys(); },
  };
})();
</script>

var $app = document.getElementById("app");

/* =========================================================================

var GF = window.__GRID_FACTS__ || { orgs: [], tracks: [], drivers: [] };

function surname(name) {
  var t = String(name).trim().split(/\s+/);
  while (t.length > 1 && /^(II|III|IV|V)$/i.test(t[t.length - 1])) t.pop();
  var last = t[t.length - 1];

/* ---------------- clue pool (built from MSS fields only) ---------------- */
function has(arr, v) { return arr.indexOf(v) >= 0; }

  var list = [];
  var orgCount = {}, trackCount = {}, wdCount = {}, sdCount = {};
  GPOOL.forEach(function (dr) {
    (dr.o || []).forEach(function (oi) { orgCount[oi] = (orgCount[oi] || 0) + 1; });
    (dr.t || []).forEach(function (ti) { trackCount[ti] = (trackCount[ti] || 0) + 1; });
    (dr.wd || []).forEach(function (dec) { wdCount[dec] = (wdCount[dec] || 0) + 1; });
    (dr.sd || []).forEach(function (dec) { sdCount[dec] = (sdCount[dec] || 0) + 1; });

  // won at; decades with at least 8 qualifiers. Mechanical thresholds, no
  // hand-picked lists.
  Object.keys(orgCount).forEach(function (k) {
    if (orgCount[k] < 8) return;
    var oi = +k;
    list.push(clue("org:" + oi, "team", "Drove for " + GF.orgs[oi], function (dr) { return has(dr.o || [], oi); }));
  });

    if (trackCount[k] < 6) return;

  });

    clue("w:1", "stat", "Won a Cup race", function (dr) { return dr.w >= 1; }),
    clue("w:10", "stat", "Won 10 or more Cup races", function (dr) { return dr.w >= 10; }),
    clue("w:30", "stat", "Won 30 or more Cup races", function (dr) { return dr.w >= 30; }),
    // Negative facts are only trustworthy for verified careers (v true).
    clue("w:never", "stat", "Never won a Cup race", function (dr) { return dr.v && dr.w === 0; }),
    clue("ft:10", "era", "Ran 10 or more full-time seasons", function (dr) { return dr.ft >= 10; }),
    clue("era:winston", "era", "Raced in the Winston Cup era", function (dr) { return dr.y0 <= 2003; })
  );

    if ((wdCount[dec] || 0) >= 8) {
      list.push(clue("wd:" + dec, "era", "Won a Cup race in the " + dec + "s", function (dr) { return has(dr.wd || [], dec); }));
    }
    if ((sdCount[dec] || 0) >= 8) {
      list.push(clue("sd:" + dec, "era", "Made a Cup start in the " + dec + "s", function (dr) { return has(dr.sd || [], dec); }));

/* ---------------- daily grid generation (deterministic per date) ---------------- */
// Full-grid guarantee: a served grid must have at least one COMPLETE

function fullSolution(rows, cols) {
  var cells = [];

      var n = cell.list[i];

function labelFor(dr) {

      el("div", { class: "gc-title", text: opts.title }),

    ]),
    el("div", { class: "gc-desc", text: opts.desc }),
    opts.stat ? el("div", { class: "gc-stat", text: opts.stat }) : null,
  ];
  var card = el("button", { class: "gamecard" + (opts.primary ? " primary" : "") + (opts.soon ? " soon" : "") }, kids);
  if (!opts.soon && opts.onClick) card.addEventListener("click", opts.onClick);
  return card;
}
function goHome() {
  if (window.__CROSSERA_MODE__) window.__CROSSERA_MODE__.leave();
  renderHub();
}
function renderHub() {
  var dk = dateKey();
  var cards = [
    gameCard({
      title: "Cross-Era Draft", primary: true, tag: "Main game",
      desc: "Build a lineup from NASCAR history. Beat the real team.",
      onClick: function () {
        lsSet(LS.lastMode, "crossera");
        if (window.__CROSSERA_MODE__) window.__CROSSERA_MODE__.enter();
      },
    }),
  ];
  var best = parseInt(lsGet(LS.streakBest) || "0", 10);
  var today = parseInt(lsGet(LS.streakToday + dk) || "0", 10);
  var streakStat = best > 0 ? ("Best: " + best + (today > 0 ? ", today: " + today : "")) : null;
  cards.push(
    gameCard({
      title: "Streak", tag: "New",
      desc: "Who had more Cup wins? Tap the driver. Keep going until you miss.",
      stat: streakStat,
      onClick: function () { lsSet(LS.lastMode, "streak"); renderStreak(); },
    })
  );
  if (SHOW_EXPERIMENTAL_MODES) {
    var gridSave = loadGridState(gridDateKey());
    var gridStat = null;
    if (gridSave && gridSave.done) {
      gridStat = "Today: " + gridSave.cells.filter(Boolean).length + "/9, played";
    } else if (gridSave) {
      gridStat = "In progress, " + gridSave.guesses + (gridSave.guesses === 1 ? " miss" : " misses") + " left";
    }
    cards.push(
      gameCard({
        title: "Daily Grid", tag: "Internal",
        desc: "Nine cells. Each needs a driver who fits the row and the column. One grid a day, same for everybody.",
        stat: gridStat || "Grid #" + gridNumber() + " is up",
        onClick: function () { lsSet(LS.lastMode, "grid"); renderGrid(); },
      })
    );
  } else {
    cards.push(
      gameCard({ title: "Daily Grid", tag: "Coming soon", soon: true, desc: "Drivers, teams, tracks and numbers. Coming soon." })
    );
  }
  cards.push(
    gameCard({ title: "Paint Booth", tag: "Coming soon", soon: true, desc: "Guess the scheme. Coming soon." }),
    gameCard({ title: "Race Picks", tag: "Coming soon", soon: true, desc: "Set your Sunday lineup. Coming soon." })
  );
  setHubScreen(null,
    el("div", { class: "checker" }),
    el("div", { class: "hub-lede", text: "Daily NASCAR games for people who remember the Tide ride. Pick a game." }),
    expBanner(),
    el("div", { class: "hub-cards" }, cards)
  );
}

/* =========================================================================
   MODE 1: DAILY GRID (internal only while SHOW_EXPERIMENTAL_MODES is false)

   TODO before Daily Grid ships publicly:
   - DONE: replaced the hand-entered seed with MSS-verified facts.
   - DONE: pool expanded to 265 drivers (111 winners, 154 full-timers).
   - DONE: full-grid backtracking guarantee, every served grid has a
     complete 9-distinct-driver solution (365/365 in the seeded-year sweep).
   - DONE: cells show the dataset display name (K. Schrader, Ku. Busch).
   - DONE: Enter submits only when exactly one candidate remains; ambiguous
     surnames always require an explicit tap.
   - DONE: counter reads misses left; right answers are free.
   - DONE: Grid runs on a UTC day key and UTC grid number. NOTE: Streak's
     today-best chip still uses the local-midnight key; aligning it is a
     public-behavior change and needs its own call.
   - DONE: every resolved guess is logged to localStorage (capped at 500);
     real rarity comes only from these logs after launch, never a
     percentage before that.
   - DONE: QA panel (?dev=1) lists every accepted answer per cell with its
     difficulty label for editorial review.
   ========================================================================= */
var Grid = null; // live state

function loadGridState(dk) {
  var raw = lsGet(LS.grid + dk);
  if (!raw) return null;
  try { return JSON.parse(raw); } catch (e) { return null; }
}
function saveGridState() {
  if (!Grid || Grid.dev) return;
  lsSet(LS.grid + Grid.date, JSON.stringify({
    rowIds: Grid.rows.map(function (r) { return r.id; }),
    colIds: Grid.cols.map(function (c) { return c.id; }),
    cells: Grid.cells, guesses: Grid.guesses, done: Grid.done,
  }));
}
function newGridState(seedStr, dk, dev) {
  var g = buildGrid(seedStr);
  return {
    date: dk, seed: seedStr, dev: !!dev, rows: g.rows, cols: g.cols,
    cells: [null, null, null, null, null, null, null, null, null],
    guesses: 9, done: false, sel: -1, feed: null,
  };
}
function initGrid(dev) {
  var dk = gridDateKey();
  if (dev) { Grid = newGridState("dev|" + Math.random(), dk, true); return; }
  var seedStr = dk;
  var saved = loadGridState(dk);
  Grid = newGridState(seedStr, dk, false);
  if (saved && saved.rowIds) {
    var rows = saved.rowIds.map(clueById), cols = saved.colIds.map(clueById);
    if (rows.every(Boolean) && cols.every(Boolean)) {
      Grid.rows = rows; Grid.cols = cols;
      Grid.cells = saved.cells; Grid.guesses = saved.guesses; Grid.done = saved.done;
    }
  }
}
function gridCellDriver(idx) { return Grid.cells[idx] ? Grid.cells[idx].n : null; }
function usedInGrid(name) {
  return Grid.cells.some(function (c) { return c && c.n === name; });
}
function gridCorrectCount() { return Grid.cells.filter(Boolean).length; }
function finishGridIfNeeded() {
  if (gridCorrectCount() === 9 || Grid.guesses <= 0) { Grid.done = true; Grid.sel = -1; }
}
function gridShareText() {
  var filled = Grid.cells.filter(Boolean);
  var lines = ["THE LINEUP GRID #" + gridNumber(), gridCorrectCount() + "/9 today"];
  if (filled.length) {
    var best = filled.slice().sort(function (a, b) { return LABEL_RANK[b.l] - LABEL_RANK[a.l]; })[0];
    lines.push("Best pull: " + best.n + " (" + best.l + ")");
  }
  var em = "";
  for (var i = 0; i < 9; i++) {
    em += Grid.cells[i] ? "🟩" : "⬛";
    if (i % 3 === 2 && i < 8) em += "\n";
  }
  lines.push(em);
  return lines.join("\n");
}

function renderGrid() {
  if (!SHOW_EXPERIMENTAL_MODES) { renderHub(); return; }
  if (!Grid || Grid.date !== gridDateKey() || (Grid.dev && !DEV)) initGrid(false);
  paintGrid();
}
function paintGrid() {
  var g = Grid;
  var head = el("div", { class: "row spread", style: "margin:8px 0 0" }, [
    el("div", { class: "wordmark display", style: "font-size:20px", text: "Grid #" + gridNumber() + (g.dev ? " · dev" : "") }),
    el("div", { class: "num", style: "font-size:20px;color:" + (g.guesses <= 2 ? "var(--red)" : "var(--cyan)"), text: g.guesses + (g.guesses === 1 ? " miss left" : " misses left") }),
  ]);
  var help = el("div", { class: "lede", style: "margin:4px 0 0;font-size:13px", text: "Tap a cell, name a driver who fits the row and the column. Each driver can only be used once. Right answers are free, nine misses ends the day." });

  var cellsWrap = el("div", { class: "ggrid" });
  mount(cellsWrap, el("div", {}));
  g.cols.forEach(function (c) { mount(cellsWrap, el("div", { class: "ghead", text: c.label })); });
  for (var r = 0; r < 3; r++) {
    mount(cellsWrap, el("div", { class: "ghead rowhead", text: g.rows[r].label }));
    for (var c = 0; c < 3; c++) {
      (function (idx) {
        var cell = g.cells[idx];
        var btn;
        if (cell) {
          btn = el("button", { class: "gcell ok" }, [
            el("span", { class: "gc-nm", text: cell.dsp || surname(cell.n) }),
            el("span", { class: "gc-r", text: cell.l }),
          ]);
        } else if (g.done) {
          btn = el("button", { class: "gcell dead" }, [el("span", { class: "gc-plus", text: "·" })]);
        } else {
          btn = el("button", { class: "gcell" + (g.sel === idx ? " sel" : "") }, [el("span", { class: "gc-plus", text: "+" })]);
          btn.addEventListener("click", function () {
            g.sel = (g.sel === idx ? -1 : idx); g.feed = null; paintGrid();
            setTimeout(function () {
              var inp = document.getElementById("gridInput");
              if (inp) inp.focus();
            }, 30);
          });
        }
        mount(cellsWrap, btn);
      })(r * 3 + c);
    }
  }

  var parts = [el("div", { class: "checker thin" }), expBanner(), head, help, cellsWrap];

  if (g.feed) {
    parts.push(el("div", { class: "gfeed " + g.feed.cls, html: g.feed.html }));
  }

  if (g.done) {
    parts.push(gridResults());
  } else if (g.sel >= 0) {
    parts.push(gridGuessPanel());
  }

  if (DEV && !g.done) {
    parts.push(el("button", { class: "btn ghost", style: "margin-top:6px", text: "Random grid (dev)", onClick: function () { initGrid(true); paintGrid(); } }));
  }
  if (DEV) parts.push(qaPanel(g));
  setHubScreen("DAILY GRID", el("div", { class: "stack" }, parts));
}

// Editorial QA panel (?dev=1 only): lists every accepted answer per cell so
// an editor can review the clue logic against the record before Grid ships.
function qaPanel(g) {
  var open = false;
  var body = el("div", { class: "hidden" });
  var btn = el("button", { class: "btn ghost", style: "margin-top:6px", text: "QA: accepted answers per cell" });
  btn.addEventListener("click", function () {
    open = !open;
    body.classList.toggle("hidden", !open);
    if (open && !body.firstChild) {
      for (var r = 0; r < 3; r++) for (var c = 0; c < 3; c++) {
        var row = g.rows[r], col = g.cols[c];
        var names = [];
        for (var i = 0; i < GPOOL.length; i++) {
          if (row.test(GPOOL[i]) && col.test(GPOOL[i])) names.push(GPOOL[i].d + " (" + labelFor(GPOOL[i]) + ")");
        }
        mount(body,
          el("div", { class: "section-title", text: "R" + (r + 1) + "C" + (c + 1) + ": " + row.label + " x " + col.label + " (" + names.length + ")" }),
          el("div", { class: "lede", style: "font-size:12.5px;margin:2px 0 8px", text: names.join(", ") || "none" })
        );
      }
    }
  });
  return el("div", {}, [btn, body]);
}
function gridGuessPanel() {
  var g = Grid;
  var row = g.rows[Math.floor(g.sel / 3)], col = g.cols[g.sel % 3];
  var sugWrap = el("div", { class: "gsug" });
  var input = el("input", {
    class: "ginput", id: "gridInput", type: "text", placeholder: "Type a driver…",
    autocomplete: "off", autocorrect: "off", spellcheck: "false",
  });
  var current = [];
  function paintSuggestions() {
    clear(sugWrap);
    current = suggest(input.value);
    current.forEach(function (d) {
      var b = el("button", {}, [
        el("span", { text: d.n + "  " }),
        el("span", { class: "yrs", text: gYears(d) }),
      ]);
      b.addEventListener("click", function () { submitGuess(d, row, col); });
      mount(sugWrap, b);
    });
  }
  input.addEventListener("input", paintSuggestions);
  input.addEventListener("keydown", function (e) {
    if (e.key !== "Enter") return;
    e.preventDefault();
    if (current.length === 1) submitGuess(current[0], row, col);
    // more than one candidate: require an explicit tap, never auto-pick
  });
  return el("div", { class: "gpanel" }, [
    el("div", { class: "gp-clues" }, [
      el("span", { text: row.label }),
      el("span", { class: "gp-x", text: "×" }),
      el("span", { text: col.label }),
    ]),
    input, sugWrap,
    el("button", { class: "btn ghost", style: "margin-top:10px", text: "Cancel", onClick: function () { g.sel = -1; g.feed = null; paintGrid(); } }),
  ]);
}

var GRIDLOG_KEY = "lineupHub:gridlog";
function logAnswer(g, row, col, d, ok) {
  if (g.dev) return; // dev grids never pollute the log
  try {
    var log = JSON.parse(lsGet(GRIDLOG_KEY) || "[]");
    log.push({ t: Date.now(), day: g.date, cell: row.id + "|" + col.id, n: d.n, ok: ok });
    if (log.length > 500) log = log.slice(log.length - 500);
    lsSet(GRIDLOG_KEY, JSON.stringify(log));
  } catch (e) {}
}
function submitGuess(d, row, col) {
  var g = Grid;
  if (g.done || g.sel < 0) return;
  if (usedInGrid(d.n)) {
    g.feed = { cls: "bad", html: "<b>" + d.n + "</b> is already on your grid today. One cell per driver." };
    paintGrid(); return;
  }
  var fitR = row.test(d), fitC = col.test(d);
  logAnswer(g, row, col, d, fitR && fitC);
  if (fitR && fitC) {
    var lab = labelFor(d);
    g.cells[g.sel] = { n: d.n, dsp: d.d, l: lab };
    g.feed = { cls: "good", html: "<b>Correct.</b> " + lab + ". " + lineFor(lab, g.seed + d.n) };
    g.sel = -1;
  } else {
    g.guesses -= 1;
    var miss = !fitR && !fitC
      ? "<b>" + d.n + "</b> doesn't fit either clue."
      : "Close. <b>" + d.n + "</b> fits “" + (fitR ? row.label : col.label) + "” but not “" + (fitR ? col.label : row.label) + "”.";
    g.feed = { cls: "bad", html: miss };
  }
  finishGridIfNeeded();
  saveGridState();
  paintGrid();
}

function gridResults() {
  var g = Grid;
  var filled = g.cells.filter(Boolean);
  var deepPlus = filled.filter(function (c) { return LABEL_RANK[c.l] >= 2; }).length;
  var sicko = filled.filter(function (c) { return c.l === "Sicko pull"; }).length;
  var share = gridShareText();
  var copyBtn = el("button", { class: "btn primary", text: "Copy share text" });
  copyBtn.addEventListener("click", function () { copyText(share, copyBtn); });
  var verdict = gridCorrectCount() === 9 ? "Clean sweep." : gridCorrectCount() >= 6 ? "Solid day in the garage." : "The grid got you today.";
  return el("div", {}, [
    el("div", { class: "banner " + (gridCorrectCount() >= 6 ? "win" : "miss"), style: "margin-top:10px" }, [
      el("div", { class: "verdict display", text: gridCorrectCount() + "/9" }),
      el("div", { class: "sub", text: verdict }),
    ]),
    el("div", { class: "sweep", style: "margin:8px 0" }, [
      el("div", { class: "grid" }, [
        statBox(gridCorrectCount() + "/9", "Cells filled"),
        statBox(String(deepPlus), "Deep cuts or better"),
        statBox(String(sicko), "Sicko pulls"),
        statBox(String(g.guesses), "Misses left over"),
      ]),
    ]),
    el("div", { class: "section-title", text: "Share it" }),
    el("div", { class: "sharebox", text: share }),
    copyBtn,
    el("button", { class: "btn ghost", style: "margin-top:10px", text: "Back to games", onClick: goHome }),
    DEV ? el("button", { class: "btn ghost", style: "margin-top:6px", text: "Random grid (dev)", onClick: function () { initGrid(true); paintGrid(); } }) : null,
  ]);
}
function statBox(v, k) {
  return el("div", { class: "stat" }, [
    el("div", { class: "v", text: v }),
    el("div", { class: "k", text: k }),
  ]);
}

/* =========================================================================
   MODE 2: STREAK (public)

   Two-source pool, nothing else can appear in a matchup:

   1. __STREAK_POOL__, MSS-verified. The clean-window rule: the MSS pull is
      complete from 1972 on (zero races missing a winner), so a career total
      is verified only when the driver's ENTIRE recorded career sits inside
      that window (first season after 1972). A driver whose first recorded
      season IS 1972, like Darrell Waltrip, cannot be proven complete from
      the data alone and is excluded from this list.
   2. __LEGEND_POOL__, source official-records. Pre-1972-era legends whose
      totals the editor supplies by hand. Never derived or adjusted here.

   The hand-seeded DRIVERS list above is never used by Streak. Difficulty
   tightens as the streak grows: wide gaps first, then close calls.
   ========================================================================= */
var Streak = null;
var SPOOL = (window.__STREAK_POOL__ || []).concat(
  (window.__LEGEND_POOL__ || []).map(function (d) {
    d.src = "official-records";
    return d;
  })
);

function gapBandFor(round) {
  if (round <= 1) return "easy";
  if (round <= 4) return "medium";
  return Math.random() < 0.75 ? "hard" : "medium";
}
function inBand(gap, band) {
  if (band === "easy") return gap >= 20;
  if (band === "medium") return gap >= 6 && gap <= 19;
  return gap >= 1 && gap <= 5;
}
function pickPair(prevPair, round) {
  var band = gapBandFor(round);
  var prev = prevPair ? [prevPair[0].n, prevPair[1].n] : [];
  for (var tries = 0; tries < 600; tries++) {
    var a = SPOOL[Math.floor(Math.random() * SPOOL.length)];
    var b = SPOOL[Math.floor(Math.random() * SPOOL.length)];
    if (a.n === b.n || a.w === b.w) continue;
    if (prev.indexOf(a.n) >= 0 || prev.indexOf(b.n) >= 0) continue;
    var gap = Math.abs(a.w - b.w);
    if (tries < 450 && !inBand(gap, band)) continue;
    return [a, b];
  }
  return [SPOOL[0], SPOOL[SPOOL.length - 1]];
}
function streakYears(d) {
  if (!d.y0 || !d.y1) return "Cup career record";
  return d.y1 >= new Date().getFullYear() ? "Cup: since " + d.y0 : "Cup: " + d.y0 + " to " + d.y1;
}
function renderStreak() {
  if (!SPOOL.length) { renderHub(); return; }
  Streak = { n: 0, pair: pickPair(null, 0), locked: false, round: 0 };
  paintStreak();
}
function paintStreak() {
  var s = Streak;
  var best = parseInt(lsGet(LS.streakBest) || "0", 10);
  var bar = el("div", { class: "streakbar" }, [
    el("div", {}, [
      el("div", { class: "label muted", style: "font-size:11px;letter-spacing:.1em;text-transform:uppercase", text: "Streak" }),
      el("div", { class: "sb-n", text: String(s.n) }),
    ]),
    el("div", { class: "muted", style: "font-size:13px;text-align:right", text: "Best: " + Math.max(best, s.n) }),
  ]);
  var cardA = duelCard(s.pair[0]);
  var cardB = duelCard(s.pair[1]);
  setHubScreen("STREAK",
    el("div", { class: "checker thin" }),
    bar,
    el("div", { class: "duelq", text: "Who had more Cup wins?" }),
    el("div", { class: "duelsub", text: "Career Cup Series wins. Tap your pick." }),
    el("div", { class: "duel" }, [cardA, el("div", { class: "vsline", text: "VS" }), cardB])
  );
}
function duelCard(d) {
  var btn = el("button", { class: "duelcard" }, [
    el("div", { class: "dc-nm", text: d.n }),
    el("div", { class: "dc-yr", text: streakYears(d) }),
    el("div", { class: "dc-w num" }),
  ]);
  btn.addEventListener("click", function () { answerStreak(d, btn); });
  return btn;
}
function answerStreak(pick, btn) {
  var s = Streak;
  if (s.locked) return;
  s.locked = true;
  var a = s.pair[0], b = s.pair[1];
  var other = pick.n === a.n ? b : a;
  var correct = pick.w > other.w;
  // reveal both win counts, mark the pick (and the actual answer on a miss)
  var nodes = document.querySelectorAll(".duelcard");
  for (var i = 0; i < nodes.length; i++) {
    var nm = nodes[i].querySelector(".dc-nm").textContent;
    var d = nm === a.n ? a : b;
    nodes[i].querySelector(".dc-w").textContent = String(d.w);
    if (nm === pick.n) nodes[i].classList.add(correct ? "right" : "wrong");
    else if (!correct) nodes[i].classList.add("right");
  }
  if (correct) {
    s.n += 1; s.round += 1;
    var dk = dateKey();
    var today = parseInt(lsGet(LS.streakToday + dk) || "0", 10);
    if (s.n > today) lsSet(LS.streakToday + dk, String(s.n));
    var best = parseInt(lsGet(LS.streakBest) || "0", 10);
    if (s.n > best) lsSet(LS.streakBest, String(s.n));
    setTimeout(function () {
      s.pair = pickPair(s.pair, s.round); s.locked = false; paintStreak();
    }, 1400);
  } else {
    setTimeout(function () { streakGameOver(pick, other); }, 1400);
  }
}
function streakGameOver(pick, other) {
  var s = Streak;
  var best = parseInt(lsGet(LS.streakBest) || "0", 10);
  var share = "THE LINEUP STREAK\nI got " + s.n + " straight.\nLost on " + pick.n + " vs " + other.n + ".\nNot proud. Playing again.";
  var copyBtn = el("button", { class: "btn ghost", text: "Copy share text" });
  copyBtn.addEventListener("click", function () { copyText(share, copyBtn); });
  setHubScreen("STREAK",
    el("div", { class: "checker" }),
    el("div", { class: "banner miss", style: "margin-top:12px" }, [
      el("div", { class: "verdict display", text: s.n + " STRAIGHT" }),
      el("div", { class: "sub", text: pick.n + " had " + pick.w + ". " + other.n + " had " + other.w + "." }),
    ]),
    el("div", { class: "sweep", style: "margin:8px 0" }, [
      el("div", { class: "grid" }, [
        statBox(String(s.n), "This run"),
        statBox(String(Math.max(best, s.n)), "Best ever"),
      ]),
    ]),
    el("div", { class: "sharebox", text: share }),
    el("button", { class: "btn primary", style: "margin-top:4px", text: "Run it back", onClick: renderStreak }),
    copyBtn,
    el("button", { class: "btn ghost", style: "margin-top:6px", text: "Back to games", onClick: goHome })
  );
}

/* ---------------- boot ---------------- */
// Measurement hook for the locked Grid (console/testing only; the mode
// itself stays behind SHOW_EXPERIMENTAL_MODES).
window.__GRID_DEBUG__ = { CLUES: CLUES, GPOOL: GPOOL, buildGrid: buildGrid, fullSolution: fullSolution, suggest: suggest, labelFor: labelFor, matchCount: matchCount };
window.__HUB__ = { home: renderHub };
renderHub();
})();
</script>
